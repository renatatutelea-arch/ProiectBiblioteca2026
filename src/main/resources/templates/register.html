<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare - Biblioteca</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d8b7a3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            color: #3a200f;
            text-align: center;
            margin-bottom: 30px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #875832;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #3a200f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #3a200f;
        }
        p {
            text-align: center;
            margin-top: 15px;
        }
        a {
            color: #3a200f;
        }
        #mesaj {
            text-align: center;
            color: #3a200f;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Înregistrare</h2>
        <input type="text" id="nume" placeholder="Nume complet" />
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="parola" placeholder="Parola" />
        <select id="rol">
            <option value="student">Student</option>
            <option value="bibliotecar">Bibliotecar</option>
        </select>
        <button onclick="register()">Înregistrează-te</button>
        <div id="mesaj"></div>
        <p>Ai deja cont? <a href="/login">Login</a></p>
    </div>

    <script>
        function register() {
            // Ia valorile din campuri
            const nume = document.getElementById('nume').value;
            const email = document.getElementById('email').value;
            const parola = document.getElementById('parola').value;
            const rol = document.getElementById('rol').value;

            // Trimite datele la backend
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nume: nume, email: email, parola: parola, rol: rol })
            })
            .then(response => response.text())
            .then(mesaj => {
                // Afiseaza mesajul returnat de backend
                document.getElementById('mesaj').innerText = mesaj;
            });
        }
    </script>
</body>
</html>
